apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: chat-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend-pod
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: himalayak143/chat-backend:v1
          ports:
            - containerPort: 5001
          env:
            - name: NODE_ENV
              value: production

            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: MONGODB_URI

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: JWT_SECRET
            - name: PORT
              value: "5001"
